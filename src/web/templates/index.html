<!DOCTYPE html>
<html>
<head>
    <title>Flood Risk Prediction</title>
    <meta charset="UTF-8">
</head>
<body>

<h2>Flood Risk Prediction</h2>

<form id="predict-form">

    <label>Date:</label>
    <input type="date" id="date" required><br><br>

    <label>Temperature (°C):</label>
    <input type="number" step="0.1" id="temperature_c" required><br><br>

    <label>Humidity (%):</label>
    <input type="number" step="0.1" id="humidity_percent" required><br><br>

    <label>Wind Speed (m/s):</label>
    <input type="number" step="0.1" id="wind_speed_ms" required><br><br>

    <label>Sea Level Pressure (hPa):</label>
    <input type="number" step="0.1" id="sea_level_pressure_hpa" required><br><br>

    <button type="submit">Predict</button>
</form>

<h3 id="result"></h3>

<script src="/static/app.js"></script>

</body>
</html>
